<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AI Ready - A free, self-paced, mobile-friendly AI skills guide for college students." />
  <meta property="og:title" content="AI Ready" />
  <meta property="og:description" content="A free, self-paced, mobile-friendly AI skills guide for college students." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="favicon.svg" />
  <meta http-equiv="refresh" content="3; url=home.html" />
  <title>AI Ready - Welcome</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --sun: #f6c155;
      --ink: #0b1020;
      --bg: linear-gradient(125deg, #10364f 0%, #0d5c7b 45%, #0f7a7a 100%);
      --text: #fef6e9;
      --card-bg: rgba(255, 255, 255, 0.12);
      --card-line: rgba(255, 255, 255, 0.2);
      --muted: #cbd5e1;
      --bar-bg: rgba(255, 255, 255, 0.1);
      --bar-fill: linear-gradient(90deg, #60a5fa, #93c5fd);
    }

    html[data-theme='dark'] {
      --sun: #ffd274;
      --ink: #08111c;
      --bg: linear-gradient(125deg, #09111c 0%, #0d1725 50%, #16243a 100%);
      --text: #f4f8ff;
      --card-bg: rgba(19, 33, 51, 0.72);
      --card-line: rgba(244, 248, 255, 0.14);
      --muted: #bfd0e4;
      --bar-bg: rgba(244, 248, 255, 0.1);
      --bar-fill: linear-gradient(90deg, #68c7e8, #9ddff3);
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 1.5rem;
      text-align: center;
    }

    .card {
      max-width: 850px;
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--card-line);
      border-radius: 20px;
      padding: 2.7rem;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(10px);
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    blockquote {
      margin: 0;
      font-size: clamp(1.1rem, 3vw, 1.35rem);
      font-style: italic;
      position: relative;
      padding: 0 1rem;
    }

    blockquote::before {
      content: '"';
      font-size: 3rem;
      position: absolute;
      left: -0.5rem;
      top: -1rem;
      opacity: 0.3;
      font-family: 'Source Serif 4', Georgia, serif;
    }

    blockquote::after {
      content: '"';
      font-size: 3rem;
      position: absolute;
      right: -0.3rem;
      bottom: -1.4rem;
      opacity: 0.22;
      font-family: 'Source Serif 4', Georgia, serif;
    }

    .author {
      margin-top: 1.5rem;
      font-weight: 600;
      opacity: 0.9;
      font-size: 1.05rem;
    }

    .controls {
      margin-top: 2rem;
      display: flex;
      gap: 1rem;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }

    .skip {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: var(--sun);
      color: var(--ink);
      text-decoration: none;
      font-weight: 600;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: all 0.3s ease;
    }

    .skip:hover,
    .skip:focus {
      transform: translateY(-2px);
    }

    .skip:focus-visible {
      outline: 2px solid #fef6e9;
      outline-offset: 2px;
    }

    .progress-bar {
      width: 100%;
      height: 3px;
      background: var(--bar-bg);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 1.5rem;
    }

    .progress-fill {
      height: 100%;
      background: var(--bar-fill);
      animation: progress 3s linear;
      border-radius: 3px;
    }

    @keyframes progress {
      from {
        width: 0%;
      }
      to {
        width: 100%;
      }
    }

    .redirect-text {
      margin-top: 1rem;
      font-size: 0.9rem;
      opacity: 0.7;
      color: var(--muted);
    }

    /* Responsive design */
    @media (max-width: 640px) {
      .card {
        padding: 1.5rem;
      }

      blockquote::before {
        font-size: 2rem;
        top: -0.5rem;
      }
    }

    /* Reduced motion support */
    @media (prefers-reduced-motion: reduce) {
      .card,
      .progress-fill {
        animation: none;
      }

      .skip:hover {
        transform: none;
      }
    }
  </style>
</head>
<script>
  try {
    const savedTheme = localStorage.getItem('ai-ready-theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    document.documentElement.dataset.theme = savedTheme || (prefersDark ? 'dark' : 'light');
  } catch (error) {
    document.documentElement.dataset.theme = 'light';
  }
</script>

<body>
  <main class="card" role="main">
    <blockquote cite="https://www.bbc.com/news/technology-30290540">
      Success in creating AI would be the biggest event in human history.
      Unfortunately, it might also be the last, unless we learn how to avoid the risks.
    </blockquote>
    <p class="author">— Stephen Hawking</p>
    
    <div class="controls">
      <a class="skip" href="home.html" aria-label="Skip to home page">
        Go to AI Ready
        <span aria-hidden="true">→</span>
      </a>
    </div>
    
    <div class="progress-bar" role="progressbar" aria-label="Auto-redirect progress" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
      <div class="progress-fill"></div>
    </div>
  </main>
</body>
</html>

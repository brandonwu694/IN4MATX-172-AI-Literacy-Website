<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AI Literacy - Understanding artificial intelligence and its implications" />
  <meta http-equiv="refresh" content="3; url=home.html" />
  <title>AI Literacy - Welcome</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0b1220 0%, #1a2332 100%);
      color: #ffffff;
      line-height: 1.6;
      padding: 1.5rem;
      text-align: center;
    }

    .card {
      max-width: 850px;
      width: 100%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    blockquote {
      margin: 0;
      font-size: clamp(1.1rem, 3vw, 1.35rem);
      font-style: italic;
      position: relative;
      padding: 0 1rem;
    }

    blockquote::before {
      content: '"';
      font-size: 3rem;
      position: absolute;
      left: -0.5rem;
      top: -1rem;
      opacity: 0.3;
      font-family: Georgia, serif;
    }

    .author {
      margin-top: 1.5rem;
      font-weight: 600;
      opacity: 0.9;
      font-size: 1.05rem;
    }

    .controls {
      margin-top: 2rem;
      display: flex;
      gap: 1rem;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }

    .skip {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: rgba(147, 197, 253, 0.15);
      color: #93c5fd;
      text-decoration: none;
      font-weight: 600;
      border-radius: 8px;
      border: 1px solid rgba(147, 197, 253, 0.3);
      transition: all 0.3s ease;
    }

    .skip:hover,
    .skip:focus {
      background: rgba(147, 197, 253, 0.25);
      border-color: rgba(147, 197, 253, 0.5);
      transform: translateX(4px);
      outline: none;
    }

    .skip:focus-visible {
      outline: 2px solid #93c5fd;
      outline-offset: 2px;
    }

    .progress-bar {
      width: 100%;
      height: 3px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 1.5rem;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #60a5fa, #93c5fd);
      animation: progress 3s linear;
      border-radius: 3px;
    }

    @keyframes progress {
      from {
        width: 0%;
      }
      to {
        width: 100%;
      }
    }

    .redirect-text {
      margin-top: 1rem;
      font-size: 0.9rem;
      opacity: 0.7;
      color: #cbd5e1;
    }

    /* Responsive design */
    @media (max-width: 640px) {
      .card {
        padding: 1.5rem;
      }

      blockquote::before {
        font-size: 2rem;
        top: -0.5rem;
      }
    }

    /* Reduced motion support */
    @media (prefers-reduced-motion: reduce) {
      .card,
      .progress-fill {
        animation: none;
      }

      .skip:hover {
        transform: none;
      }
    }
  </style>
</head>

<body>
  <main class="card" role="main">
    <blockquote cite="https://www.bbc.com/news/technology-30290540">
      Success in creating AI would be the biggest event in human history.
      Unfortunately, it might also be the last, unless we learn how to avoid the risks.
    </blockquote>
    <p class="author">— Stephen Hawking</p>
    
    <div class="controls">
      <a class="skip" href="home.html" aria-label="Skip to home page">
        Skip 
        <span aria-hidden="true">→</span>
      </a>
    </div>
    
    <div class="progress-bar" role="progressbar" aria-label="Auto-redirect progress" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
      <div class="progress-fill"></div>
    </div>
    
    <p class="redirect-text">Redirecting in 3 seconds...</p>
  </main>
</body>
</html>
